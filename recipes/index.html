<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recipes</title>
<style>
  :root {
    --bg: #faf8f4;
    --bg-panel: #ffffff;
    --ink: #1c1a17;
    --ink-soft: #6b665e;
    --line: #e7e2d8;
    --accent: #7a8a5c;
    --accent-soft: #eef1e6;
    --radius: 16px;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */

  aside {
    border-right: 1px solid var(--line);
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    background: var(--bg);
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 26px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .brand p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* ---------- Tabs ---------- */

  .tabs {
    display: flex;
    gap: 6px;
  }

  .tabs button {
    flex: 1;
    padding: 9px 0;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-panel);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .tabs button.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  /* ---------- Todos view ---------- */

  .todo-header h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 42px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  .todo-header p {
    margin: 0 0 36px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .todo-section { margin-bottom: 36px; }

  .todo-section h3 {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin: 0 0 12px;
  }

  .todo-list { list-style: none; margin: 0; padding: 0; }

  .todo-list li {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 14.5px;
    line-height: 1.5;
  }

  .todo-list .mark {
    flex: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    align-self: center;
  }

  .todo-list li.done-item { opacity: 0.55; }
  .todo-list li.done-item .mark { background: var(--accent); }
  .todo-list li.done-item .text { text-decoration: line-through; }

  .todo-list .text { flex: 1; }

  .todo-list .age {
    font-size: 11.5px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .todo-list .age.stale { color: #b45309; font-weight: 600; }

  .todo-empty {
    font-size: 14px;
    color: var(--ink-soft);
    font-family: var(--serif);
    padding: 8px 2px;
  }

  /* ---------- Budget view ---------- */

  .budget-total {
    font-family: var(--serif);
    font-size: 54px;
    letter-spacing: -0.01em;
    margin: 0 0 2px;
  }

  .budget-sub { font-size: 13px; color: var(--ink-soft); margin: 0 0 32px; }

  .cat-row {
    display: grid;
    grid-template-columns: 120px 1fr 90px;
    gap: 14px;
    align-items: center;
    margin-bottom: 12px;
    font-size: 13.5px;
  }

  .cat-row .name { color: var(--ink); text-transform: capitalize; }

  .cat-row .bar-track {
    height: 10px;
    border-radius: 99px;
    background: var(--accent-soft);
    overflow: hidden;
  }

  .cat-row .bar {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
  }

  .cat-row .amt { text-align: right; font-variant-numeric: tabular-nums; }

  .cat-row .over { color: #dc2626; font-weight: 600; }
  .cat-row .under { color: var(--accent); }

  .trend {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    height: 110px;
    margin-top: 10px;
  }

  .trend .col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }

  .trend .tbar {
    width: 100%;
    max-width: 46px;
    border-radius: 8px 8px 4px 4px;
    background: var(--accent-soft);
    border: 1px solid var(--line);
  }

  .trend .col.current .tbar { background: var(--accent); border-color: var(--accent); }

  .trend .tlabel { font-size: 10.5px; color: var(--ink-soft); }
  .trend .tamt { font-size: 11px; color: var(--ink); font-variant-numeric: tabular-nums; }

  /* ---------- Messages table ---------- */

  .insights-box {
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 32px;
  }

  .insights-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .insights-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .insights-list li {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
  }

  .insights-count {
    margin-left: 6px;
    font-size: 11px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .msg-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
    margin-right: 6px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--ink-soft);
  }

  .msg-tag-money { background: #fef3c7; border-color: #fde68a; color: #92400e; }
  .msg-tag-time { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
  .msg-tag-question { background: #dbeafe; border-color: #bfdbfe; color: #1e40af; }
  .msg-tag-piling { background: #ede9fe; border-color: #ddd6fe; color: #5b21b6; }
  .msg-tag-catchup { background: var(--bg-panel); border-color: var(--line); color: var(--ink-soft); }

  .msg-tag-cell { white-space: nowrap; }

  .msg-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin-bottom: 8px;
  }

  .msg-table th {
    text-align: left;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    padding: 0 10px 8px;
    border-bottom: 1px solid var(--line);
  }

  .msg-table td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }

  .msg-table tr:last-child td { border-bottom: none; }

  .msg-name { font-weight: 600; white-space: nowrap; }
  .msg-text { color: var(--ink-soft); line-height: 1.4; }
  .msg-when { white-space: nowrap; color: var(--ink-soft); font-size: 12px; }
  .msg-unanswered { text-align: center; font-variant-numeric: tabular-nums; }

  /* ---------- Unlock ---------- */

  .unlock {
    max-width: 380px;
    margin: 18vh auto 0;
    text-align: center;
  }

  .unlock h2 { font-family: var(--serif); font-weight: 400; font-size: 28px; margin: 0 0 8px; }
  .unlock p { font-size: 13px; color: var(--ink-soft); margin: 0 0 20px; }

  .unlock input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-panel);
    font-family: var(--sans);
    font-size: 14px;
    text-align: center;
    outline: none;
  }

  .unlock input:focus { border-color: var(--accent); }

  .unlock button {
    margin-top: 12px;
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .unlock .err { color: #dc2626; font-size: 12.5px; margin-top: 10px; display: none; }

  .search {
    position: relative;
  }

  .search input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-panel);
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }

  .search input:focus {
    border-color: var(--accent);
  }

  .filters {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .filters select {
    width: 100%;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-panel);
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b665e' fill='none' stroke-width='1.5'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    cursor: pointer;
  }

  .filters select:focus { border-color: var(--accent); }

  .filters select.active-filter {
    border-color: var(--accent);
    background-color: var(--accent-soft);
  }

  .clear-filters {
    align-self: flex-start;
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    display: none;
  }

  .clear-filters.visible { display: inline; }

  .recipe-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }

  .recipe-item {
    padding: 14px 14px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .recipe-item:hover {
    background: var(--bg-panel);
    border-color: var(--line);
  }

  .recipe-item.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .recipe-item .title {
    font-size: 14.5px;
    font-weight: 600;
    margin: 0 0 4px;
    line-height: 1.3;
  }

  .recipe-item .meta {
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .recipe-item .meta .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--ink-soft);
    display: inline-block;
  }

  .source-heading {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    padding: 10px 14px 2px;
  }

  .empty-list {
    font-size: 13px;
    color: var(--ink-soft);
    padding: 12px 14px;
  }

  .sidebar-footer {
    margin-top: auto;
    font-size: 11.5px;
    color: var(--ink-soft);
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }

  /* ---------- Week picks ---------- */

  .recipe-item { position: relative; }

  .pick-btn {
    position: absolute;
    top: 12px;
    right: 10px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg-panel);
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }

  .pick-btn:hover { border-color: var(--accent); color: var(--accent); }

  .pick-btn.picked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .recipe-item .title { padding-right: 30px; }

  .picks-box {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-panel);
    padding: 12px 14px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .picks-box.has-picks { display: flex; }

  .picks-box .picks-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }

  .picks-box .picks-names {
    font-size: 13px;
    line-height: 1.45;
  }

  .picks-actions { display: flex; gap: 8px; }

  .picks-box button.action {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }

  .picks-box button.action.secondary {
    background: var(--bg-panel);
    color: var(--ink-soft);
    border-color: var(--line);
    flex: 0 0 auto;
  }

  .picks-box .copied-note { font-size: 11.5px; color: var(--accent); display: none; }

  /* ---------- Main panel ---------- */

  main {
    padding: 64px 72px;
    overflow-y: auto;
    max-width: 880px;
  }

  .recipe-header {
    margin-bottom: 40px;
  }

  .recipe-header .category {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 16px;
    font-weight: 600;
  }

  .recipe-header h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 42px;
    line-height: 1.15;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }

  .recipe-header .note {
    font-size: 16px;
    color: var(--ink-soft);
    margin: 0 0 18px;
    line-height: 1.5;
    max-width: 60ch;
  }

  .recipe-header .attribution {
    font-size: 13px;
    color: var(--ink-soft);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .recipe-header .attribution .tag {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11.5px;
  }

  .nutrition-strip {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .nutrition-strip .macro {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
  }

  .nutrition-strip .macro b {
    display: block;
    font-size: 15px;
    color: var(--ink);
  }

  .nutrition-strip .macro span {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .nutrition-strip .estimate-note {
    align-self: center;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .content-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 56px;
    align-items: start;
  }

  section.block {
    margin-bottom: 32px;
  }

  section.block:last-child {
    margin-bottom: 0;
  }

  .block h3 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 18px;
    margin: 0 0 14px;
    color: var(--ink);
  }

  .ingredient-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ingredient-list li {
    font-size: 14.5px;
    line-height: 1.5;
    padding-left: 22px;
    position: relative;
    color: var(--ink);
  }

  .ingredient-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 7px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .method-steps {
    list-style: none;
    margin: 0;
    padding: 0;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .method-steps li {
    counter-increment: step;
    display: flex;
    gap: 16px;
    font-size: 15px;
    line-height: 1.6;
  }

  .method-steps li::before {
    content: counter(step);
    flex: none;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--bg);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
  }

  .no-selection {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--ink-soft);
    font-family: var(--serif);
    font-size: 20px;
    text-align: center;
  }

  .back-btn {
    display: none;
    margin-bottom: 18px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--bg-panel);
    color: var(--ink-soft);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  @media (max-width: 860px) {
    body { grid-template-columns: 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--line); }
    main { padding: 40px 24px; }
    .content-grid { grid-template-columns: 1fr; gap: 32px; }
    .recipe-header h2 { font-size: 32px; }

    /* Master-detail: hide the list while a recipe is open, show a back button. */
    body.mobile-detail aside { display: none; }
    body.mobile-detail .back-btn { display: inline-block; }
  }
</style>
</head>
<body>

  <aside>
    <div class="brand">
      <h1>Tej's Kitchen</h1>
      <p>Recipes, plans, and loose ends.</p>
    </div>
    <div class="tabs">
      <button id="tab-recipes" class="active">Recipes</button>
      <button id="tab-todos">Todos</button>
      <button id="tab-budget">Budget</button>
      <button id="tab-messages">Texts</button>
    </div>
    <div id="recipes-side" style="display: contents">
    <div class="search">
      <input id="search" type="text" placeholder="Search recipes…" autocomplete="off" />
    </div>
    <div class="filters">
      <select id="filter-category"><option value="">Any category</option></select>
      <select id="filter-source"><option value="">Any creator</option></select>
      <select id="filter-tag"><option value="">Any tag</option></select>
      <button class="clear-filters" id="clear-filters">Clear filters ✕</button>
    </div>
    <ul class="recipe-list" id="recipe-list"></ul>
    <div class="picks-box" id="picks-box">
      <div class="picks-title">This week</div>
      <div class="picks-names" id="picks-names"></div>
      <div class="picks-actions">
        <button class="action" id="copy-picks">Copy for WhatsApp</button>
        <button class="action secondary" id="clear-picks" title="Clear picks">✕</button>
      </div>
      <div class="copied-note" id="copied-note">Copied — text it to OpenClaw 🛒</div>
    </div>
    </div>
    <div class="sidebar-footer" id="count"></div>
  </aside>

  <main id="main">
    <div class="no-selection">Select a recipe</div>
  </main>

  <script src="data.js?v=20260721a"></script>
  <script src="todos.js?v=20260721a"></script>
  <script src="budget.js?v=20260721a"></script>
  <script src="imessage.js?v=20260721a"></script>
  <script>
    const state = {
      query: "",
      activeId: null,
      tab: "recipes",
      picks: new Set(JSON.parse(localStorage.getItem("weekPicks") || "[]")),
      filters: { category: "", source: "", tag: "" },
    };

    async function setTab(tab) {
      state.tab = tab;
      ["recipes", "todos", "budget", "messages"].forEach((t) =>
        document.getElementById("tab-" + t).classList.toggle("active", t === tab)
      );
      document.getElementById("recipes-side").style.display = tab === "recipes" ? "contents" : "none";
      if (tab !== "recipes") document.body.classList.remove("mobile-detail");
      if (tab === "recipes") {
        renderList();
        renderDetail();
      } else if (!(await ensureUnlocked(tab))) {
        return; // unlock screen shown
      } else if (tab === "todos") {
        renderTodos();
      } else if (tab === "budget") {
        renderBudget();
      } else {
        renderMessages();
      }
    }

    function money(n) {
      return "$" + Math.round(n).toLocaleString("en-US");
    }

    // ---------- Encrypted data (todos/budget) ----------
    // Blobs ship as salt+iv+ciphertext only; key is derived from the
    // passphrase in-browser (PBKDF2) and lives in sessionStorage.

    const secure = { todos: null, budget: null, messages: null };

    async function decryptBlob(enc, passphrase) {
      const b64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
      const keyMaterial = await crypto.subtle.importKey(
        "raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64(enc.salt), iterations: enc.iter, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
      const pt = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64(enc.iv) }, key, b64(enc.ct));
      return JSON.parse(new TextDecoder().decode(pt));
    }

    async function tryUnlock(passphrase) {
      if (typeof TODOS_ENC !== "undefined") secure.todos = await decryptBlob(TODOS_ENC, passphrase);
      if (typeof BUDGET_ENC !== "undefined") secure.budget = await decryptBlob(BUDGET_ENC, passphrase);
      if (typeof IMESSAGE_ENC !== "undefined") secure.messages = await decryptBlob(IMESSAGE_ENC, passphrase);
      sessionStorage.setItem("dashKey", passphrase);
      return true;
    }

    function renderUnlock(afterTab) {
      mainEl.innerHTML = `
        <div class="unlock">
          <h2>🔒 Private</h2>
          <p>Enter the dashboard passphrase to view todos &amp; budget.</p>
          <input id="unlock-pass" type="password" placeholder="passphrase" autocomplete="current-password" />
          <button id="unlock-btn">Unlock</button>
          <div class="err" id="unlock-err">Wrong passphrase.</div>
        </div>`;
      countEl.textContent = "";
      const input = document.getElementById("unlock-pass");
      const go = async () => {
        try {
          await tryUnlock(input.value.trim());
          setTab(afterTab);
        } catch {
          document.getElementById("unlock-err").style.display = "block";
          input.select();
        }
      };
      document.getElementById("unlock-btn").addEventListener("click", go);
      input.addEventListener("keydown", (e) => e.key === "Enter" && go());
      input.focus();
    }

    function hasEncBlob(tab) {
      if (tab === "todos") return typeof TODOS_ENC !== "undefined";
      if (tab === "budget") return typeof BUDGET_ENC !== "undefined";
      if (tab === "messages") return typeof IMESSAGE_ENC !== "undefined";
      return false;
    }

    async function ensureUnlocked(tab) {
      const needed = hasEncBlob(tab) && !secure[tab];
      if (!needed) return true;
      const cached = sessionStorage.getItem("dashKey");
      if (cached) {
        try { await tryUnlock(cached); return true; } catch { sessionStorage.removeItem("dashKey"); }
      }
      renderUnlock(tab);
      return false;
    }

    function renderBudget() {
      const b = secure.budget || (typeof BUDGET !== "undefined" ? BUDGET : { months: [], budgets: {} });
      if (!b.months.length) {
        mainEl.innerHTML = `
          <div class="todo-header">
            <h2>Budget</h2>
            <p>No expenses yet — text OpenClaw "spent $12 on lunch" or send a statement PDF.</p>
          </div>`;
        countEl.textContent = "";
        return;
      }

      const cur = b.months[b.months.length - 1];
      const monthName = (ym) =>
        new Date(ym + "-15T12:00:00").toLocaleDateString("en-US", { month: "short" });
      const cats = Object.entries(cur.byCategory);
      const maxCat = Math.max(...cats.map(([, v]) => v), 1);

      const catRows = cats
        .map(([cat, amt]) => {
          const target = b.budgets[cat];
          let delta = "";
          if (target) {
            delta =
              amt > target
                ? ` <span class="over">+${money(amt - target)}</span>`
                : ` <span class="under">${money(target - amt)} left</span>`;
          }
          return `<div class="cat-row">
            <span class="name">${escapeHtml(cat)}</span>
            <div class="bar-track"><div class="bar" style="width:${Math.max(4, (amt / maxCat) * 100)}%"></div></div>
            <span class="amt">${money(amt)}${delta}</span>
          </div>`;
        })
        .join("");

      const trendMonths = b.months.slice(-6);
      const maxMonth = Math.max(...trendMonths.map((m) => m.total), 1);
      const trend = trendMonths
        .map(
          (m, i) => `<div class="col${i === trendMonths.length - 1 ? " current" : ""}">
            <span class="tamt">${money(m.total)}</span>
            <div class="tbar" style="height:${Math.max(8, (m.total / maxMonth) * 70)}px"></div>
            <span class="tlabel">${monthName(m.ym)}</span>
          </div>`
        )
        .join("");

      mainEl.innerHTML = `
        <div class="todo-header">
          <h2>Budget</h2>
          <p>Aggregates only — ask OpenClaw on WhatsApp for any detail${b.generatedAt ? ` · updated ${escapeHtml(b.generatedAt)}` : ""}</p>
        </div>
        <p class="budget-total">${money(cur.total)}</p>
        <p class="budget-sub">${monthName(cur.ym)} spending · ${cur.count} expense${cur.count === 1 ? "" : "s"}</p>
        <div class="todo-section"><h3>By category</h3>${catRows}</div>
        <div class="todo-section"><h3>Last ${trendMonths.length} months</h3><div class="trend">${trend}</div></div>
      `;
      countEl.textContent = `${monthName(cur.ym)}: ${money(cur.total)}`;
    }

    function ageDays(dateStr) {
      if (!dateStr) return null;
      const days = Math.floor((Date.now() - new Date(dateStr + "T12:00:00")) / 86400000);
      return days < 0 ? 0 : days;
    }

    function renderTodos() {
      const t = secure.todos || (typeof TODOS !== "undefined" ? TODOS : { inbox: [], inProgress: [], done: [] });
      const open = (t.inbox || []).concat(t.inProgress || []);

      const itemHtml = (item, doneItem) => {
        const days = ageDays(item.added);
        const stale = !doneItem && days != null && days > 7;
        const age = doneItem
          ? item.done ? `done ${escapeHtml(item.done)}` : ""
          : days != null ? `${days}d${stale ? " · stale" : ""}` : "";
        return `<li class="${doneItem ? "done-item" : ""}">
          <span class="mark"></span>
          <span class="text">${escapeHtml(item.text)}</span>
          ${age ? `<span class="age${stale ? " stale" : ""}">${age}</span>` : ""}
        </li>`;
      };

      const section = (title, items, doneItems) =>
        `<div class="todo-section">
          <h3>${title}</h3>
          ${items.length
            ? `<ul class="todo-list">${items.map((i) => itemHtml(i, doneItems)).join("")}</ul>`
            : `<div class="todo-empty">${doneItems ? "Nothing yet." : "All clear ✨"}</div>`}
        </div>`;

      mainEl.innerHTML = `
        <div class="todo-header">
          <h2>Todos</h2>
          <p>Text OpenClaw on WhatsApp to add or finish — this page follows along${t.generatedAt ? ` · updated ${escapeHtml(t.generatedAt)}` : ""}</p>
        </div>
        ${section("Open", open, false)}
        ${section("Done", t.done || [], true)}
      `;
      countEl.textContent = `${open.length} open todo${open.length === 1 ? "" : "s"}`;
    }

    function timeAgo(ts) {
      if (!ts) return "";
      const then = new Date(ts.replace(" ", "T"));
      const diffMs = Date.now() - then.getTime();
      const h = Math.floor(diffMs / 3600000);
      if (h < 1) return "just now";
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      return `${d}d ago`;
    }

    const TAG_ORDER = ["money", "time", "question", "piling", "catchup"];
    const TAG_LABEL = {
      money: "💰 Money", time: "⏰ Time-sensitive", question: "❓ Needs an answer",
      piling: "📌 Piling up", catchup: "💬 Catch up",
    };

    function renderMessages() {
      const m = secure.messages || (typeof IMESSAGE !== "undefined" ? IMESSAGE : null);
      if (!m || !m.threads || !m.threads.length) {
        mainEl.innerHTML = `
          <div class="todo-header">
            <h2>Texts</h2>
            <p>No pending threads — run the iMessage sift on WhatsApp to refresh this.</p>
          </div>`;
        countEl.textContent = "";
        return;
      }

      const focus = m.threads
        .filter((t) => t.verdict === "focus")
        .slice()
        .sort((a, b) => {
          const ai = TAG_ORDER.indexOf(a.tag), bi = TAG_ORDER.indexOf(b.tag);
          if (ai !== bi) return ai - bi;
          if ((b.score || 0) !== (a.score || 0)) return (b.score || 0) - (a.score || 0);
          return (b.unanswered || 0) - (a.unanswered || 0);
        });
      const over = m.threads.filter((t) => t.verdict === "over");

      const tagBadge = (tag) =>
        `<span class="msg-tag msg-tag-${escapeHtml(tag || "catchup")}">${escapeHtml(TAG_LABEL[tag] || "💬 Catch up")}</span>`;

      const insightsHtml = (m.insights || []).length
        ? `<div class="insights-box">
            <div class="insights-title">✨ Where to start</div>
            <ul class="insights-list">
              ${m.insights
                .map(
                  (i) => `<li>
                    ${tagBadge(i.tag)}
                    <b>${escapeHtml(i.name)}</b> — ${escapeHtml(i.text || "[no text]")}
                    ${i.unanswered > 1 ? `<span class="insights-count">${i.unanswered} unanswered</span>` : ""}
                  </li>`
                )
                .join("")}
            </ul>
          </div>`
        : "";

      const row = (t) => `
        <tr>
          <td class="msg-name">${escapeHtml(t.name)}</td>
          <td class="msg-tag-cell">${tagBadge(t.tag)}</td>
          <td class="msg-text">${escapeHtml(t.text || "[no text]")}</td>
          <td class="msg-when">${escapeHtml(timeAgo(t.ts))}</td>
          <td class="msg-unanswered">${t.unanswered}</td>
        </tr>`;

      const table = (rows) => `
        <table class="msg-table">
          <thead><tr><th>Who</th><th>Tag</th><th>Last message</th><th>When</th><th>Unanswered</th></tr></thead>
          <tbody>${rows.map(row).join("")}</tbody>
        </table>`;

      mainEl.innerHTML = `
        <div class="todo-header">
          <h2>Texts</h2>
          <p>iMessage threads awaiting your reply, last ${m.windowDays || 20} days${m.generatedAt ? ` · updated ${escapeHtml(m.generatedAt)}` : ""}</p>
        </div>
        ${insightsHtml}
        <div class="todo-section">
          <h3>Focus (${focus.length})</h3>
          ${focus.length ? table(focus) : `<div class="todo-empty">Nothing pressing.</div>`}
        </div>
        <div class="todo-section">
          <h3>Likely over (${over.length})</h3>
          ${over.length ? table(over) : `<div class="todo-empty">Nothing here.</div>`}
        </div>
      `;
      countEl.textContent = `${focus.length} to focus on`;
    }

    const listEl = document.getElementById("recipe-list");
    const mainEl = document.getElementById("main");
    const searchEl = document.getElementById("search");
    const countEl = document.getElementById("count");
    const picksBoxEl = document.getElementById("picks-box");
    const picksNamesEl = document.getElementById("picks-names");

    function savePicks() {
      localStorage.setItem("weekPicks", JSON.stringify([...state.picks]));
    }

    function togglePick(id) {
      state.picks.has(id) ? state.picks.delete(id) : state.picks.add(id);
      savePicks();
      renderList();
      renderPicks();
    }

    function renderPicks() {
      const picked = RECIPES.filter((r) => state.picks.has(r.id));
      picksBoxEl.classList.toggle("has-picks", picked.length > 0);
      picksNamesEl.textContent = picked.map((r) => r.title).join(" · ");
    }

    function filteredRecipes() {
      const q = state.query.trim().toLowerCase();
      const f = state.filters;
      return RECIPES.filter((r) => {
        const tags = (r.tags || []).map((t) => t.toLowerCase());
        if (f.category && r.category !== f.category) return false;
        if (f.source && r.source !== f.source) return false;
        if (f.tag && !tags.includes(f.tag)) return false;
        if (!q) return true;
        const haystack = [r.title, r.category, r.source, ...(r.tags || [])]
          .join(" ")
          .toLowerCase();
        return haystack.includes(q);
      });
    }

    function populateFilters() {
      const fill = (id, values) => {
        const sel = document.getElementById(id);
        const current = sel.value;
        while (sel.options.length > 1) sel.remove(1);
        values.forEach((v) => {
          const o = document.createElement("option");
          o.value = v;
          o.textContent = v;
          sel.appendChild(o);
        });
        sel.value = current;
      };
      const uniq = (arr) => [...new Set(arr)].sort();
      fill("filter-category", uniq(RECIPES.map((r) => r.category).filter(Boolean)));
      fill("filter-source", uniq(RECIPES.map((r) => r.source).filter(Boolean)));
      fill(
        "filter-tag",
        uniq(RECIPES.flatMap((r) => r.tags || []).map((t) => t.toLowerCase()))
      );
    }

    function syncFilterUi() {
      const map = { category: "filter-category", source: "filter-source", tag: "filter-tag" };
      let any = false;
      for (const [key, id] of Object.entries(map)) {
        const el = document.getElementById(id);
        el.classList.toggle("active-filter", Boolean(state.filters[key]));
        if (state.filters[key]) any = true;
      }
      document.getElementById("clear-filters").classList.toggle("visible", any);
    }

    function renderList() {
      const recipes = filteredRecipes();
      listEl.innerHTML = "";

      if (recipes.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty-list";
        empty.textContent = "No recipes match.";
        listEl.appendChild(empty);
        countEl.textContent = `${RECIPES.length} recipe${RECIPES.length === 1 ? "" : "s"} saved`;
        return;
      }

      // Group by contributor, preserving first-seen order.
      const groups = new Map();
      recipes.forEach((r) => {
        const key = r.source || "Unknown";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      });

      groups.forEach((groupRecipes, source) => {
        const heading = document.createElement("li");
        heading.className = "source-heading";
        heading.textContent = source;
        listEl.appendChild(heading);

        groupRecipes.forEach((r) => {
          const li = document.createElement("li");
          li.className = "recipe-item" + (r.id === state.activeId ? " active" : "");
          const picked = state.picks.has(r.id);
          li.innerHTML = `
            <p class="title">${escapeHtml(r.title)}</p>
            <div class="meta">
              <span>${escapeHtml(r.category)}</span>
            </div>
            <button class="pick-btn${picked ? " picked" : ""}" title="${picked ? "Remove from this week" : "Pick for this week"}">${picked ? "✓" : "+"}</button>
          `;
          li.addEventListener("click", () => selectRecipe(r.id));
          li.querySelector(".pick-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            togglePick(r.id);
          });
          listEl.appendChild(li);
        });
      });

      countEl.textContent = `${RECIPES.length} recipe${RECIPES.length === 1 ? "" : "s"} saved`;
    }

    function isMobile() {
      return window.matchMedia("(max-width: 860px)").matches;
    }

    function selectRecipe(id) {
      state.activeId = id;
      renderList();
      renderDetail();
      if (isMobile()) {
        document.body.classList.add("mobile-detail");
        window.scrollTo(0, 0);
      }
    }

    function backToList() {
      document.body.classList.remove("mobile-detail");
      window.scrollTo(0, 0);
    }

    function renderDetail() {
      const recipe = RECIPES.find((r) => r.id === state.activeId);
      if (!recipe) {
        mainEl.innerHTML = `<div class="no-selection">Select a recipe</div>`;
        return;
      }

      const ingredientsHtml = recipe.ingredientGroups
        .map(
          (g) => `
        <section class="block">
          <h3>${escapeHtml(g.heading)}</h3>
          <ul class="ingredient-list">
            ${g.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </section>`
        )
        .join("");

      const methodHtml = recipe.methodGroups
        .map(
          (g) => `
        <section class="block">
          <h3>${escapeHtml(g.heading)}</h3>
          <ol class="method-steps">
            ${g.steps.map((s) => `<li>${escapeHtml(s)}</li>`).join("")}
          </ol>
        </section>`
        )
        .join("");

      const n = recipe.nutrition;
      const nutritionHtml = n && n.perServing
        ? `<div class="nutrition-strip">
            <div class="macro"><b>${escapeHtml(String(n.perServing.calories))}</b><span>kcal</span></div>
            <div class="macro"><b>${escapeHtml(String(n.perServing.protein_g))}g</b><span>protein</span></div>
            <div class="macro"><b>${escapeHtml(String(n.perServing.carbs_g))}g</b><span>carbs</span></div>
            <div class="macro"><b>${escapeHtml(String(n.perServing.fat_g))}g</b><span>fat</span></div>
            ${n.perServing.fiber_g != null ? `<div class="macro"><b>${escapeHtml(String(n.perServing.fiber_g))}g</b><span>fiber</span></div>` : ""}
            <div class="estimate-note">per serving · ${escapeHtml(String(n.servings))} servings${n.estimated ? " · estimated" : ""}</div>
          </div>`
        : "";

      mainEl.innerHTML = `
        <button class="back-btn" id="back-btn">← All recipes</button>
        <div class="recipe-header">
          <span class="category">${escapeHtml(recipe.category)}</span>
          <h2>${escapeHtml(recipe.title)}</h2>
          ${recipe.note ? `<p class="note">${escapeHtml(recipe.note)}</p>` : ""}
          <div class="attribution">
            <span>From ${escapeHtml(recipe.source)}</span>
            <span class="tag">Added ${escapeHtml(recipe.dateAdded)}</span>
          </div>
          ${nutritionHtml}
        </div>
        <div class="content-grid">
          <div>${ingredientsHtml}</div>
          <div>${methodHtml}</div>
        </div>
      `;
      document.getElementById("back-btn").addEventListener("click", backToList);
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    searchEl.addEventListener("input", (e) => {
      state.query = e.target.value;
      renderList();
    });

    document.getElementById("copy-picks").addEventListener("click", () => {
      const picked = RECIPES.filter((r) => state.picks.has(r.id));
      if (picked.length === 0) return;
      const msg =
        "This week's recipes: " +
        picked.map((r) => r.title).join(", ") +
        " (ids: " + picked.map((r) => r.id).join(", ") + ")";
      navigator.clipboard.writeText(msg).then(() => {
        const note = document.getElementById("copied-note");
        note.style.display = "block";
        setTimeout(() => (note.style.display = "none"), 2500);
      });
    });

    document.getElementById("clear-picks").addEventListener("click", () => {
      state.picks.clear();
      savePicks();
      renderList();
      renderPicks();
    });

    [["filter-category", "category"], ["filter-source", "source"], ["filter-tag", "tag"]].forEach(
      ([id, key]) => {
        document.getElementById(id).addEventListener("change", (e) => {
          state.filters[key] = e.target.value;
          syncFilterUi();
          renderList();
        });
      }
    );

    document.getElementById("clear-filters").addEventListener("click", () => {
      state.filters = { category: "", source: "", tag: "" };
      ["filter-category", "filter-source", "filter-tag"].forEach(
        (id) => (document.getElementById(id).value = "")
      );
      syncFilterUi();
      renderList();
    });

    document.getElementById("tab-recipes").addEventListener("click", () => setTab("recipes"));
    document.getElementById("tab-todos").addEventListener("click", () => setTab("todos"));
    document.getElementById("tab-budget").addEventListener("click", () => setTab("budget"));
    document.getElementById("tab-messages").addEventListener("click", () => setTab("messages"));

    // Initial render
    populateFilters();
    syncFilterUi();
    renderList();
    renderPicks();
    if (RECIPES.length > 0 && !isMobile()) {
      selectRecipe(RECIPES[0].id);
    }
  </script>

</body>
</html>
